            --platform=linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64/v8,linux/386,linux/ppc64le,linux/s390x \
            --output "type=image,push=true" \
            --build-arg TAG=3.13 \
            --build-arg BUILD_DATE="$(date +%Y-%m-%d)" \
            --tag vcxpz/apk-packager:latest \
            --tag vcxpz/apk-packager:3.13 \
            --file Dockerfile .

      - name: Get New Package Versions From Image
        run: |
          docker run --rm --entrypoint /bin/sh -v ${PWD}:/tmp vcxpz/apk-packager:latest -c '\
            apk info -v | sort >/tmp/package_versions.txt'

      - name: Update README
        run: |
          export APP_VERSION=$(curl -sX GET "https://api.github.com/repos/hydazz/docker-apk-packager/releases/latest" | jq -r .tag_name)
          chmod +x .github/update_readme.sh && .github/update_readme.sh

      - name: Commit And Push Changes To Github
        run: |
          git add -A
          git commit -m "Bot Updating Files" || echo "No Changes"
          git push || echo "No Changes"

      - name: Sync README With Docker Hub
        uses: peter-evans/dockerhub-description@v2
        with:
          username: vcxpz
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: vcxpz/apk-packager

